<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>草津温泉 旅のしおり｜2026.7.18–19</title>
<link rel="icon" type="image/png" href="assets/onsen-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mohave:wght@500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FCF5EF;          /* クリーム地（星野リゾート recruit） */
    --ink:#1F1B17;         /* 墨に近い暖かい黒 */
    --ink-soft:#6E645B;    /* 補足テキスト */
    --line:#E4D9CD;        /* 罫・区切り */
    --tag:#E7DED4;         /* タグ地 */
    --accent:#B5471F;      /* 朱・暖色アクセント（時間厳守） */
    --reserved:#A3B18A;    /* 柔らかい緑（予約済み） */
    --route:#837B70;       /* 行路・帰路（鼠色） */
    --onsen:#9C6B3B;       /* 温泉 */
    --gourmet:#7A7A3C;     /* グルメ */
    --sight:#C2703F;       /* 観光（暖色枠） */
    --serif:"Noto Serif JP", "Yu Mincho", "游明朝", "Hiragino Mincho ProN", serif;
    --sans:"Noto Sans JP", "Yu Gothic", "游ゴシック", "Hiragino Sans", sans-serif;
    --disp:"Mohave", "Noto Sans JP", sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.8;
    letter-spacing:0.04em;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:480px;margin:0 auto;padding:0 20px 64px;}

  /* ===== Hero ===== */
  header.hero{padding:44px 0 22px;text-align:center;}
  .hero .eyebrow{
    font-family:var(--disp);font-weight:500;font-size:12px;letter-spacing:.34em;
    color:var(--onsen);text-transform:uppercase;
  }
  .hero h1{
    font-family:var(--serif);font-weight:700;font-size:30px;line-height:1.5;
    letter-spacing:.06em;margin:10px 0 6px;
  }
  .hero .dates{font-size:13px;color:var(--ink-soft);letter-spacing:.1em;}
  .hero .rule{width:38px;height:2px;background:var(--accent);margin:20px auto 0;}

  /* ===== Legend ===== */
  .legend{
    display:flex;flex-wrap:wrap;justify-content:center;gap:6px 16px;
    margin-top:22px;padding:14px 12px;border:1px solid var(--line);border-radius:10px;
  }
  .legend .lg{font-size:11.5px;color:var(--ink-soft);letter-spacing:.06em;white-space:nowrap;}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;border:2px solid;
    vertical-align:middle;margin-right:5px;box-sizing:border-box;background:var(--bg);}
  .fill-warm{background:var(--accent);border-color:var(--accent);}
  .fill-green{background:var(--reserved);border-color:var(--reserved);}
  .line-route{border-color:var(--route);}
  .line-sight{border-color:var(--sight);}

  /* ===== Day block ===== */
  .day{margin-top:38px;}
  .day-head{position:relative;padding-bottom:14px;margin-bottom:22px;border-bottom:1px solid var(--line);}
  .day-num{
    font-family:var(--disp);font-weight:600;font-size:56px;line-height:.9;
    letter-spacing:-.03em;color:var(--ink);
  }
  .day-meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:4px;}
  .day-jp{font-family:var(--serif);font-weight:600;font-size:17px;letter-spacing:.08em;}
  .day-date{font-size:12px;color:var(--ink-soft);letter-spacing:.08em;}

  /* ===== Section label ===== */
  .seg{
    display:inline-block;font-family:var(--serif);font-size:13px;font-weight:600;
    letter-spacing:.16em;color:var(--ink-soft);margin:22px 0 6px;padding-left:2px;
  }
  .seg::before{content:"—　";color:var(--onsen);}

  /* ===== Timeline ===== */
  ol.timeline{list-style:none;position:relative;margin-left:4px;}
  ol.timeline::before{
    content:"";position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:var(--line);
  }
  li.item{position:relative;padding:0 0 20px 26px;}
  li.item::before{
    content:"";position:absolute;left:0;top:8px;width:11px;height:11px;border-radius:50%;
    background:var(--bg);border:2px solid var(--onsen);box-sizing:border-box;
  }
  li.item[data-cat="route"]::before{border-color:var(--route);}
  li.item[data-cat="onsen"]::before{border-color:var(--onsen);}
  li.item[data-cat="gourmet"]::before{border-color:var(--gourmet);}
  li.item[data-cat="sight"]::before{border-color:var(--sight);}
  li.item[data-cat="mustcatch"]::before{border-color:var(--accent);background:var(--accent);}
  li.item[data-cat="reserved"]::before{border-color:var(--reserved);background:var(--reserved);}
  .t-time{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.02em;color:var(--ink);}
  .t-title{font-family:var(--serif);font-weight:600;font-size:15.5px;line-height:1.7;margin-top:1px;}
  .t-note{font-size:12.5px;color:var(--ink-soft);line-height:1.7;margin-top:3px;}
  .t-tag{
    display:inline-block;font-size:10.5px;letter-spacing:.12em;
    background:var(--tag);color:var(--ink-soft);border-radius:15px;
    padding:1px 9px;margin-top:6px;margin-right:6px;vertical-align:middle;
  }
  .t-tag.catch{background:rgba(181,71,31,.12);color:var(--accent);}
  .t-tag.resv{background:rgba(163,177,138,.22);color:#5f6e46;}
  .t-link{
    display:inline-block;font-size:11.5px;letter-spacing:.06em;color:var(--accent);
    text-decoration:none;border-bottom:1px solid rgba(181,71,31,.35);margin-top:6px;
  }
  .t-link::after{content:" ↗";font-size:10px;}

  /* ===== Map embed (responsive) ===== */
  .day-map{margin-top:26px;}
  .map-frame{
    position:relative;width:100%;aspect-ratio:4/3;
    border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#efe7dd;
  }
  .map-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  @media (max-width:380px){ .map-frame{aspect-ratio:1/1;} }

  /* ===== Footer ===== */
  footer{margin-top:44px;padding-top:22px;border-top:1px solid var(--line);}
  footer h2{font-family:var(--serif);font-size:13px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:12px;}
  footer .ref{display:block;font-size:12px;color:var(--ink-soft);text-decoration:none;padding:5px 0;border-bottom:1px dotted var(--line);letter-spacing:.03em;}
  footer .ref b{color:var(--ink);font-weight:500;}
  footer .fine{font-family:var(--disp);font-size:10px;letter-spacing:.24em;color:var(--ink-soft);text-transform:uppercase;text-align:center;margin-top:24px;}

  @media print{
    body{background:#fff;}
    .t-link,.t-link::after{color:#8a3a1a;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="eyebrow">Kusatsu Onsen · 2 Days</div>
    <h1>草津温泉<br>旅のしおり</h1>
    <div class="dates">2026年 7月18日（土）〜 19日（日）</div>
    <div class="rule"></div>
  </header>

  <main id="app"></main>

  <footer>
    <h2>参考リンク</h2>
    <a class="ref" href="https://rurubu.jp/andmore/article/21734" target="_blank" rel="noopener"><b>草津グルメ</b></a>
    <a class="ref" href="https://www.nap-camp.com/mag/50097" target="_blank" rel="noopener"><b>湯畑食べ歩きスイーツ</b></a>
    <a class="ref" href="https://onsen-kusatsu.com/sainokawara/" target="_blank" rel="noopener"><b>西の河原露天風呂</b></a>
    <a class="ref" href="https://www.kusatsu-onsen.ne.jp/netsunoyu/show.html" target="_blank" rel="noopener"><b>熱乃湯</b>（湯もみショー）</a>
    <a class="ref" href="https://www.kusatsu-onsen.ne.jp/ura-kusatsu_jizo/" target="_blank" rel="noopener"><b>裏草津 地蔵</b></a>
    <a class="ref" href="https://onsen-kusatsu.com/" target="_blank" rel="noopener"><b>御座之湯・大滝乃湯</b>（草津三湯）</a>
    <a class="ref" href="http://nettaiken.com/index.html" target="_blank" rel="noopener"><b>草津熱帯圏</b>（動物園）</a>
    <a class="ref" href="https://travel.rakuten.co.jp/mytrip/howto/kusatsu-souvenir" target="_blank" rel="noopener"><b>草津温泉 お土産ガイド</b></a>
    <div class="fine">Have a nice trip</div>
  </footer>
</div>

<script>
/* ============================================================
   予定データ（ここを編集すると予定が変わります）
   - 日ごと: DAY1 / DAY2 のコメントで区切り
   - 区分ごと: SEGMENT コメントで区切り
   - 1予定 = 1行のオブジェクト {time, cat, title, note, tags, link}
   - cat: mustcatch=時間厳守(暖色塗) / reserved=予約済み(緑塗)
          route=行路・帰路(鼠色) / onsen=温泉 / gourmet=グルメ / sight=観光(暖色枠)
   ============================================================ */
const DAYS = [
  /* ===== DAY1 / 7月18日（土） ここから ===== */
  {
    num:"01", jp:"一日目", date:"7.18 SAT",
    map:"https://www.google.com/maps/d/embed?mid=1A87vbAqirN-sxr0-xEu3TvaRLuwzMyQ&ehbc=2E312F",
    segments:[
      /* --- SEGMENT: 行路 --- */
      { label:"行路", items:[
        {time:"8:40",  cat:"mustcatch", title:"上野駅 集合", tags:["時間厳守"]},
        {time:"9:00",  cat:"reserved",  title:"特急 草津・四万31号 乗車", tags:["予約済み"]},
        {time:"11:24", cat:"route", title:"長野原草津口駅 着"},
        {time:"11:51", cat:"route", title:"JRバス 乗車"},
        {time:"12:13", cat:"route", title:"草津温泉 着"},
      ]},
      /* --- SEGMENT: 草津温泉 観光（1日目） --- */
      { label:"草津温泉 観光", items:[
        {time:"12:30", cat:"sight", title:"大東館に荷物を預ける"},
        {time:"12:45", cat:"gourmet", title:"湯畑 草庵で草津温泉バーガー／上州牛ランチ", note:"昼食", tags:["昼食"], link:"https://rurubu.jp/andmore/article/21734"},
        {time:"14:00", cat:"gourmet", title:"湯畑 食べ歩き", note:"本家ちちや蒸したてまんじゅう・山びこ揚げまんじゅう・草津温泉プリン・上州牛まん", link:"https://www.nap-camp.com/mag/50097"},
        {time:"15:00", cat:"onsen",  title:"御座之湯 or 大滝乃湯でクールダウン", note:"日帰り温泉", tags:["日帰り温泉①"], link:"https://onsen-kusatsu.com/"},
        {time:"16:00", cat:"sight", title:"熱乃湯 湯もみショー", note:"16:00 または 16:30 回・700円", link:"https://www.kusatsu-onsen.ne.jp/netsunoyu/show.html"},
        {time:"16:45", cat:"sight",  title:"裏草津を街歩き", note:"地蔵エリアの路地・カフェ月の貌でスイーツ＋足湯・顔湯", link:"https://www.kusatsu-onsen.ne.jp/ura-kusatsu_jizo/"},
        {time:"17:45", cat:"sight",  title:"大東館へ戻る"},
        {time:"18:00", cat:"mustcatch", title:"大東館で夕食", tags:["時間厳守"]},
        {time:"19:00", cat:"sight", title:"白根神社 夏祭り"},
        {time:"20:00", cat:"sight", title:"湯畑周辺でお神輿観光"},
      ]},
    ]
  },
  /* ===== DAY1 ここまで ===== */

  /* ===== DAY2 / 7月19日（日） ここから ===== */
  {
    num:"02", jp:"二日目", date:"7.19 SUN",
    map:"https://www.google.com/maps/d/embed?mid=1RYFcpZXLlb9JhcGalJYiJZNVbVkLYRY&ehbc=2E312F",
    segments:[
      /* --- SEGMENT: 草津温泉 観光（2日目） --- */
      { label:"草津温泉 観光", items:[
        {time:"10:00", cat:"sight",  title:"ホテル チェックアウト", note:"荷物を預ける"},
        {time:"10:30", cat:"onsen",  title:"西の河原露天風呂で朝湯", note:"800円", tags:["日帰り温泉②"], link:"https://onsen-kusatsu.com/sainokawara/"},
        {time:"11:15", cat:"sight",  title:"草津熱帯圏（動物園）", note:"温泉熱ドームのカピバラ・爬虫類／8:30–17:00・大人1,300円", link:"http://nettaiken.com/index.html"},
        {time:"12:30", cat:"gourmet", title:"名物ランチ＆お土産", note:"温泉まんじゅう食べ比べ（本家ちちや・松むら饅頭）＋地酒・花豆", tags:["昼食","お土産"], link:"https://travel.rakuten.co.jp/mytrip/howto/kusatsu-souvenir"},
        {time:"13:45", cat:"mustcatch", title:"大東館で手荷物を受け取り", tags:["時間厳守"]},
      ]},
      /* --- SEGMENT: 帰路 --- */
      { label:"帰路", items:[
        {time:"14:15", cat:"mustcatch", title:"草津温泉バスターミナル 着", tags:["時間厳守"]},
        {time:"14:30", cat:"reserved", title:"高速バス 乗車", tags:["予約済み"]},
        {time:"18:33", cat:"route", title:"東京駅 日本橋口 着・解散"},
      ]},
    ]
  }
  /* ===== DAY2 ここまで ===== */
];

function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function tagHTML(t){
  let cls = t==="時間厳守" ? " catch" : (t==="予約済み" ? " resv" : "");
  return `<span class="t-tag${cls}">${esc(t)}</span>`;
}
function itemHTML(it){
  let tags = (it.tags||[]).map(tagHTML).join("");
  let link = it.link ? `<a class="t-link" href="${it.link}" target="_blank" rel="noopener">参考リンク</a>` : "";
  let note = it.note ? `<div class="t-note">${esc(it.note)}</div>` : "";
  return `<li class="item" data-cat="${it.cat}">
    <div class="t-time">${esc(it.time)}</div>
    <div class="t-title">${esc(it.title)}</div>
    ${note}
    <div>${tags}${link}</div>
  </li>`;
}
function render(){
  document.getElementById("app").innerHTML = DAYS.map(d=>`
    <section class="day">
      <div class="day-head">
        <div class="day-num">DAY ${d.num}</div>
        <div class="day-meta"><span class="day-jp">${d.jp}</span><span class="day-date">${d.date}</span></div>
      </div>
      ${d.segments.map(seg=>`
        <div class="seg">${esc(seg.label)}</div>
        <ol class="timeline">${seg.items.map(itemHTML).join("")}</ol>
      `).join("")}
      ${d.map ? `<div class="day-map">
        <div class="seg">散策ルート</div>
        <div class="map-frame"><iframe src="${d.map.replace(/&/g,'&amp;')}" loading="lazy" title="${esc(d.jp)}の地図"></iframe></div>
      </div>` : ""}
    </section>
  `).join("");
}
render();
</script>
</body>
</html>
